services:
  backend:
    container_name: deeplab-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DEEPLAB_DB_PATH: /app/persist/deeplab.duckdb
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_RELOAD: "0"
      FASTEMBED_CACHE_PATH: /app/persist/fastembed
    ports:
      - 8000:8000
    volumes:
      - ./deeplab_data:/app/persist
    restart: unless-stopped

  frontend:
    container_name: deeplab-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_BASE_URL: http://backend:8000
    ports:
      - 3000:3000
    restart: unless-stopped
