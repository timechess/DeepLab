services:
  pg:
    container_name: deeplab-db
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deeplab}
      POSTGRES_DB: deeplab
    ports:
      - 5432:5432
    volumes:
      - ./persist/pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deeplab"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    container_name: deeplab-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      pg:
        condition: service_healthy
    environment:
      POSTGRES_HOST: pg
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deeplab}
      POSTGRES_DB: deeplab
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_RELOAD: "0"
      FASTEMBED_CACHE_PATH: /app/persist/fastembed
    ports:
      - 8000:8000
    volumes:
      - ./persist/fastembed:/app/persist/fastembed
    restart: unless-stopped

  frontend:
    container_name: deeplab-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_BASE_URL: http://backend:8000
    ports:
      - 3000:3000
    restart: unless-stopped
